<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Battleship</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Battleship</h1>
<div id="message"></div>
<button id="new-game">New game</button>
<div id="boards"></div>

<div id="stats">

    <div>
        <h3>Player</h3>

        <p>Hits:
            <span id="player-hits">0</span>
        </p>

        <p>Misses:
            <span id="player-misses">0</span>
        </p>

    </div>


    <div>
        <h3>Game</h3>

        <p>Turns:
            <span id="turns">0</span>
        </p>

    </div>


    <div>
        <h3>Computer</h3>

        <p>Hits:
            <span id="computer-hits">0</span>
        </p>

        <p>Misses:
            <span id="computer-misses">0</span>
        </p>

    </div>

</div>

<script type="module" src="./src/index.js"></script>

</body>
</html>
